groups:

- name: trade-risk-alerts

  rules:

  - alert: FastAPIDown
    expr: up{job="trade-risk-api"} == 0
    for: 1m

    labels:
      severity: critical

    annotations:
      summary: FastAPI Down
      description: FastAPI service is unreachable.

  - alert: HighRiskTrades
    expr: high_risk_trades_total > 20
    for: 30s

    labels:
      severity: critical

    annotations:
      summary: High Risk Trades
      description: More than 20 high-risk trades detected.

  - alert: TooManyAnomalies
    expr: anomalies_total > 10
    for: 30s

    labels:
      severity: warning

    annotations:
      summary: Too Many Anomalies
      description: Too many anomalies detected.

  - alert: TooManyTrades
    expr: total_trades_processed_total > 500
    for: 1m

    labels:
      severity: warning

    annotations:
      summary: High Trade Volume
      description: Total processed trades exceeded threshold.

  - alert: HighMemoryUsage
    expr: process_resident_memory_bytes > 500000000
    for: 2m

    labels:
      severity: warning

    annotations:
      summary: High Memory Usage
      description: Memory usage exceeded 500 MB.

  - alert: HighCPUUsage
    expr: rate(process_cpu_seconds_total[5m]) > 0.8
    for: 2m

    labels:
      severity: warning

    annotations:
      summary: High CPU Usage
      description: CPU usage exceeded 80%.