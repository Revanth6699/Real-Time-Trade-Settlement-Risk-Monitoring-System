groups:

- name: trade-risk-alerts

  rules:

  - alert: HighRiskTrades
    expr: high_risk_trades_total > 20
    for: 30s

    labels:
      severity: critical

    annotations:
      summary: High Risk Trades
      description: High risk trades exceeded threshold.

  - alert: TooManyAnomalies
    expr: anomalies_total > 10
    for: 30s

    labels:
      severity: warning

    annotations:
      summary: Too Many Anomalies
      description: Anomaly count exceeded threshold.

  - alert: TooManyTrades
    expr: total_trades_processed_total > 500
    for: 1m

    labels:
      severity: warning

    annotations:
      summary: High Trade Volume
      description: Trade volume exceeded threshold.

  - alert: FastAPIDown
    expr: up{job="trade-risk-api"} == 0
    for: 1m

    labels:
      severity: critical

    annotations:
      summary: FastAPI Down
      description: FastAPI is unreachable.