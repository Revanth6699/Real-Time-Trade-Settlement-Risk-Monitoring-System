global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - scheme: https
      timeout: 30s
      static_configs:
        - targets:
            - alert-manager-jjz4.onrender.com            

scrape_configs:
  - job_name: trade-risk-api

    scheme: https

    metrics_path: /metrics

    static_configs:
      - targets:
          - real-time-trade-settlement-risk.onrender.com