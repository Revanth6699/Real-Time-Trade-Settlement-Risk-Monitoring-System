global:
  scrape_interval: 5s

rule_files:
  - "alerts.yml"

scrape_configs:

  - job_name: "fastapi"

    metrics_path: /metrics

    static_configs:
      - targets:
          - api:8000

  - job_name: "prometheus"

    static_configs:
      - targets:
          - prometheus:9090


alerting:

  alertmanagers:

    - static_configs:
        - targets:
            - alertmanager:9093