services:

  # =====================================================
  # FASTAPI BACKEND
  # =====================================================

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api

    ports:
      - "8000:8000"
    
    env_file:
      - .env

    environment:

      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    volumes:
      - .:/app

    restart: always


  # =====================================================
  # TRADE PRODUCER
  # =====================================================

  producer:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: producer

    command: ["python", "-m", "app.services.producer_service"]


    env_file:
      - .env


    environment:

      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}
    volumes:
      - .:/app

    restart: always

  # =====================================================
  # TRADE CONSUMER
  # =====================================================

  consumer:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: consumer

    command: ["python", "-m", "app.services.consumer_service"]



    env_file:
      - .env



    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_TOPIC: ${KAFKA_TOPIC}
      KAFKA_USERNAME: ${KAFKA_USERNAME}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL}
      KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM}      

    volumes:
      - .:/app

    restart: always

  # =====================================================
  # PROMETHEUS
  # =====================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    depends_on:
      - api

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

    restart: always

  # =====================================================
  # GRAFANA
  # =====================================================

  grafana:
    image: grafana/grafana

    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

    volumes:
      - grafana_data:/var/lib/grafana

    restart: always


  alertmanager:
    image: prom/alertmanager
    container_name: alertmanager
    ports:
      - "9093:9093"

    command:
    - "--config.file=/etc/alertmanager/alertmanager.yml"

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    volumes:
      - ./app/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml

volumes:
  grafana_data: